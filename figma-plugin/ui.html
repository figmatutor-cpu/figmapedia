<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Pretendard Variable', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0a0a14;
      color: #e5e5e5;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    .header {
      padding: 16px 16px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .header h1 {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 2px;
    }

    .header p {
      font-size: 11px;
      color: #888;
    }

    /* Search */
    .search-box {
      padding: 12px 16px;
    }

    .search-input-wrap {
      display: flex;
      align-items: center;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 0 12px;
      transition: border-color 0.2s;
    }

    .search-input-wrap:focus-within {
      border-color: rgba(255,255,255,0.25);
    }

    .search-icon {
      width: 16px;
      height: 16px;
      opacity: 0.4;
      flex-shrink: 0;
    }

    .search-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: #fff;
      font-size: 13px;
      padding: 10px 8px;
      font-family: inherit;
    }

    .search-input::placeholder {
      color: #666;
    }

    /* Results area */
    .results {
      flex: 1;
      overflow-y: auto;
      padding: 0 16px 16px;
    }

    .results::-webkit-scrollbar { width: 4px; }
    .results::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

    /* Status messages */
    .status {
      text-align: center;
      padding: 40px 16px;
      color: #666;
      font-size: 12px;
      line-height: 1.6;
    }

    .status.error { color: #f87171; }

    /* Loading */
    .loading-dots {
      display: inline-flex;
      gap: 4px;
      margin-top: 8px;
    }

    .loading-dots span {
      width: 6px;
      height: 6px;
      background: #6366f1;
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out both;
    }

    .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
    .loading-dots span:nth-child(2) { animation-delay: -0.16s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }

    /* Summary */
    .summary {
      background: rgba(99,102,241,0.08);
      border: 1px solid rgba(99,102,241,0.2);
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 12px;
      font-size: 12px;
      line-height: 1.65;
      color: #c7c7d1;
    }

    .summary-label {
      font-size: 10px;
      font-weight: 600;
      color: #818cf8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    /* Result card */
    .result-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .result-card:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.18);
    }

    .result-title {
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 6px;
      line-height: 1.4;
    }

    .result-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .badge {
      display: inline-block;
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 99px;
      background: rgba(255,255,255,0.08);
      color: #aaa;
    }

    .badge.section {
      background: rgba(99,102,241,0.15);
      color: #a5b4fc;
    }

    /* Result count */
    .result-count {
      font-size: 11px;
      color: #666;
      margin-bottom: 10px;
    }

    /* Footer */
    .footer {
      padding: 8px 16px;
      border-top: 1px solid rgba(255,255,255,0.06);
      text-align: center;
    }

    .footer a {
      font-size: 10px;
      color: #666;
      text-decoration: none;
      cursor: pointer;
    }

    .footer a:hover { color: #999; }
  </style>
</head>
<body>

  <div class="header">
    <h1>Figmapedia</h1>
    <p>AI 검색으로 피그마 지식을 찾아보세요</p>
  </div>

  <div class="search-box">
    <div class="search-input-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input class="search-input" id="searchInput" type="text" placeholder="예: 오토 레이아웃 사용법" autocomplete="off" />
    </div>
  </div>

  <div class="results" id="results">
    <div class="status">
      Enter 키를 눌러 AI 검색을 시작하세요
    </div>
  </div>

  <div class="footer">
    <a id="openSite">figmapediarenewal.vercel.app</a>
  </div>

  <script>
    const API_URL = "https://figmapedia.com/api/ai-search";
    const SITE_URL = "https://figmapedia.com";

    const searchInput = document.getElementById("searchInput");
    const resultsEl = document.getElementById("results");
    const openSiteLink = document.getElementById("openSite");

    openSiteLink.addEventListener("click", () => {
      parent.postMessage({ pluginMessage: { type: "open-link", url: SITE_URL } }, "*");
    });

    searchInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && searchInput.value.trim()) {
        doSearch(searchInput.value.trim());
      }
    });

    async function doSearch(query) {
      resultsEl.innerHTML = `
        <div class="status">
          AI가 검색 중입니다...
          <div class="loading-dots"><span></span><span></span><span></span></div>
        </div>`;

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ query }),
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || `HTTP ${res.status}`);
        }

        const data = await res.json();
        renderResults(data);
      } catch (err) {
        resultsEl.innerHTML = `<div class="status error">${err.message}</div>`;
      }
    }

    function renderResults(data) {
      let html = "";

      if (data.summary) {
        html += `
          <div class="summary">
            <div class="summary-label">AI Summary</div>
            ${escapeHtml(data.summary)}
          </div>`;
      }

      if (data.results && data.results.length > 0) {
        html += `<div class="result-count">${data.results.length}개 결과</div>`;

        data.results.forEach((item) => {
          const link = item.link || `${SITE_URL}/entry/${item.id}`;
          const categories = (item.categories || [])
            .map((c) => `<span class="badge">${escapeHtml(c)}</span>`)
            .join("");
          const section = item.section
            ? `<span class="badge section">${escapeHtml(item.section)}</span>`
            : "";

          html += `
            <div class="result-card" data-link="${escapeAttr(link)}">
              <div class="result-title">${escapeHtml(item.title)}</div>
              <div class="result-meta">${section}${categories}</div>
            </div>`;
        });
      } else {
        html += `<div class="status">관련 결과를 찾지 못했습니다.</div>`;
      }

      resultsEl.innerHTML = html;

      resultsEl.querySelectorAll(".result-card").forEach((card) => {
        card.addEventListener("click", () => {
          const url = card.getAttribute("data-link");
          if (url) {
            parent.postMessage({ pluginMessage: { type: "open-link", url } }, "*");
          }
        });
      });
    }

    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str;
      return div.innerHTML;
    }

    function escapeAttr(str) {
      return str.replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }

    searchInput.focus();
  </script>
</body>
</html>
